name: |
  (T) Pytest
permissions:
  contents: read
  pull-requests: write

on:
  push:
  workflow_dispatch:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.12'
        description: 'Python version used.'

jobs:
  pytest:
    runs-on:
      group: managed
    env:
      PYTHON_VERSION: ${{ github.event.inputs['python-version'] || '3.12' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install python${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: pipx install --python python${{ env.PYTHON_VERSION }} uv==0.11.31
      - name: Install the library using uv
        shell: bash
        run: uv sync --group dev --no-install-project --no-build --frozen
      - name: Unit tests
        if: ${{ hashFiles('tests/') != '' }}
        shell: bash
        run: PYTHONPATH=. uv run --no-sync --no-build pytest
      - name: Upload coverage.xml as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        if: ${{ hashFiles('coverage.xml') != '' }}
        with:
          name: coverage.xml
          path: ./coverage.xml
