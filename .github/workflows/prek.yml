name: |
  (CI) Prek
permissions:
  contents: read
  pull-requests: write

on:
  push:
    inputs:
      python-version:
        required: false
        default: '3.12'
        type: string
        description: 'Python version used.'

jobs:
  pre-commit:
    runs-on:
      group: managed
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version:  ${{ inputs.python-version }}
      - name: Install uv
        run: pipx install --python python${{ inputs.python-version }} uv==0.11.31
      - name: Install prek
        run: uv sync --group dev --no-install-project --no-build --frozen
      - name: Run prek
        shell: bash
        run: PYTHONPATH=. uv run --no-sync --no-build prek run -a
