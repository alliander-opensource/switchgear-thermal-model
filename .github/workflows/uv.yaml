name: uv.yml
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  generate_uv:
    if: github.actor == 'thewouter'
    runs-on:
      group: managed
    permissions:
      contents: read # for actions/checkout
      id-token: write # required so r2r-action can mint a token
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version:  ${{ inputs.python-version }}

      - name: Install uv
        run: pipx install --python python${{ inputs.python-version }} uv==0.11.31

      - name: Install prek
        run: uv lock

      - name: print uv.lock
        shell: bash
        run: cat uv.lock