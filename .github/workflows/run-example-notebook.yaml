# This workflow is used to run the example notebooks and check if they execute without raising any exceptions.

name: Run Example Notebooks
permissions:
  contents: read
  pull-requests: read

env:
  python-version: '3.12'

on:
  push:  
    branches: [ "main" ]  
  pull_request:  
    branches: [ "main" ]

jobs:
  check-notebooks:
    runs-on:
      group: managed
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install python${{ env.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.python-version }}
      - name: Install Poetry
        run: pipx install --python python${{ env.python-version }} poetry
      - name: Install the library using poetry
        shell: bash
        run: poetry install --with docs
      - name: Run example notebooks
        run: |
          for notebook in docs/examples/*.ipynb; do
            poetry run jupyter nbconvert --to notebook --execute "$notebook"
          done