name: (CI) publish Package
on:
    workflow_dispatch:

jobs:
  build-package:
    runs-on:
      group: managed
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13

      - name: Install uv
        run: |
           pipx install --python python${{ env.PYTHON_VERSION }} uv==0.11.31
      - name: Build package
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: switchgear-thermal-model-package
          path: dist/
  publish-to-pypi:
    name: Publish to PyPI
    needs:
    - build-package
    runs-on:
      group: managed
    environment:
      name: pypi
      url: https://pypi.org/p/switchgear-thermal-model
    permissions:
      id-token: write
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: switchgear-thermal-model-package
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b #v1.14.0
  publish-to-github:
    name: Publish to GitHub Releases
    needs:
    - build-package
    runs-on:
      group: managed
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: switchgear-thermal-model-package
        path: dist/
        
    - name: Get package version
      id: get_version
      run: |
        # Extract version from pyproject.toml
        VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "version=v$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: v$VERSION"
        
    - name: Generate changelog
      id: generate_changelog
      run: |
        # Get the previous release tag
        PREVIOUS_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          echo "changelog=First release of the switchgear-thermal-model package." >> $GITHUB_OUTPUT
        else
          echo "Generating changelog from $PREVIOUS_TAG to HEAD"
          
          # Get merged PRs since last release
          CHANGELOG=$(gh pr list \
            --state merged \
            --base main \
            --search "merged:>$(gh release view $PREVIOUS_TAG --json publishedAt --jq .publishedAt)" \
            --json number,title,author \
            --jq '.[] | "- #\(.number): \(.title) (@\(.author.login))"' \
            | head -20)
          
          if [ -z "$CHANGELOG" ]; then
            echo "changelog=No notable changes since the previous release." >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "### Changes" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        fi
      env:
        GH_TOKEN: ${{ github.token }}
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        files: |
          dist/*.tar.gz
          dist/*.whl
        body: |
          ## Release ${{ steps.get_version.outputs.version }}
          
          ### Installation
          ```bash
          pip install switchgear-thermal-model==${{ steps.get_version.outputs.version }}
          ```
          
          ### Package Files
          - Source distribution (`.tar.gz`)
          - Wheel distribution (`.whl`)
          
          ---
          
          ${{ steps.generate_changelog.outputs.changelog }}
        draft: false
        prerelease: false
        generate_release_notes: true